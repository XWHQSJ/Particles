name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libgl-dev libglu1-mesa-dev libxkbcommon-dev libwayland-dev

      - name: Build
        run: |
          cmake -B build -S . -DUSE_MODERN_GL=ON -DBUILD_TESTS=OFF
          cmake --build build -j

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
