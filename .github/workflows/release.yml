name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
          - os: macos-14
            name: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libgl-dev libglu1-mesa-dev

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_MODERN_GL=ON \
            -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build build -j --config Release

      - name: Package
        run: |
          mkdir -p dist
          cp build/demos/* dist/ 2>/dev/null || true
          cp -r shaders dist/ 2>/dev/null || true
          cp -r allParticles/Data dist/ 2>/dev/null || true
          tar czf "particles-${{ matrix.name }}.tar.gz" -C dist .

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: particles-${{ matrix.name }}.tar.gz
